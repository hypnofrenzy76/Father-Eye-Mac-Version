plugins {
    id 'application'
    id 'java'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

version = project.findProperty('panelVersion') ?: '0.1.0'
archivesBaseName = 'fathereye-panel'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
    maven {
        name = 'localMaven'
        url = uri("${rootProject.projectDir}/local-maven")
    }
}

application {
    // Launcher trick: a non-Application class calls Application.launch() from
    // its main(). Required because JavaFX Application.main is locked to JPMS
    // modular launch on Java 9+ unless invoked from a non-Application entry.
    mainClass = 'io.fathereye.panel.Launcher'
}

javafx {
    version = project.javafxVersion
    modules = ['javafx.base', 'javafx.graphics', 'javafx.controls', 'javafx.fxml']
}

dependencies {
    implementation project(':mapcore')

    // Web addon (HTTPS / login / REST / WebSocket remote-control panel).
    // Loaded via ServiceLoader on the runtime classpath; the panel's
    // own code references it only through io.fathereye.panel.addon.*
    // SPI types so the web addon stays optional. To disable it,
    // remove the resulting jar from the install lib directory and
    // restart the panel.
    runtimeOnly project(':webaddon')

    implementation "net.java.dev.jna:jna-platform:${jnaVersion}"
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-cbor:${jacksonVersion}"
    implementation "org.jctools:jctools-core:${jctoolsVersion}"
    implementation "org.xerial:sqlite-jdbc:${sqliteVersion}"
    // JFreeChart-FX 2.0.1 transitively pulls org.openjfx:javafx-swing:15.
    // Exclude the stale transitive and pin the swing artifact at
    // ${javafxVersion} so all JavaFX modules ship as a coherent set.
    // Mac fork: target Intel x64 only (Mid 2011 iMac is Sandy Bridge),
    // so the mac-aarch64 classifier is irrelevant; classifier=mac (x64)
    // is what the JavaFX plugin auto-selects on an Intel Mac host.
    implementation("org.jfree:org.jfree.chart.fx:${jfreechartFxVersion}") {
        exclude group: 'org.openjfx', module: 'javafx-swing'
    }
    implementation "org.openjfx:javafx-swing:${project.javafxVersion}"
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"
    implementation "ch.qos.logback:logback-classic:${logbackVersion}"

    testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"
}

test {
    useJUnitPlatform()
}

// =========================================================================
// Mac fork build pipeline.
//
// Upstream father-eye targeted Windows with a custom C# launcher (.exe
// embedding panel + bridge as PE resources). This Mac fork drops all of
// that and ships only the standard jpackage outputs:
//
//   :panel:jpackageMacApp     -> dist/Father Eye.app   (run on macOS)
//   :panel:jpackageMacDmg     -> dist/Father Eye.dmg   (run on macOS)
//
// Both MUST run on a macOS host — jpackage cannot cross-compile. The
// JavaFX gradle plugin auto-selects classifier `mac` (Intel x64) when
// building on an Intel Mac host, which matches the user's Mid 2011 iMac.
//
// Critical JVM properties baked into the bundle via --java-options:
//
//   -Dprism.order=es2,sw           Force OpenGL pipeline first, software
//                                  fallback. JFX 17 on macOS 10.13.6 with
//                                  the AMD HD 6750M needs es2 (Metal is
//                                  unavailable; JFX 21+ would also fail
//                                  here, but JFX 17 ships es2 natives).
//   -Dprism.lcdtext=false          Disables LCD subpixel anti-aliasing
//                                  text rendering, which crashes some
//                                  pre-Metal AMD drivers under
//                                  prism-es2 on macOS.
//   -Dprism.allowhidpi=false       Stops JFX from negotiating a Retina
//                                  backbuffer on the Mid 2011 iMac
//                                  (1920x1080 non-Retina); the negotiation
//                                  fails on the HD 6750M's CGL pixel-
//                                  format query path.
//   -Dprism.verbose=true           Emit pipeline-selection logs to
//                                  stderr so panel.log captures whether
//                                  es2 or sw was picked.
//
// LSMinimumSystemVersion 10.13.0 is set on the bundle so macOS treats
// the .app as supported on the user's High Sierra install.
// =========================================================================

// Modules pulled into the bundled JLink runtime. Be generous: any module
// listed here is included; missing modules cause ClassNotFoundException
// on first use deep inside a transitive dependency.
def fePanelJdkModules = [
        'java.base', 'java.desktop', 'java.logging', 'java.management',
        'java.naming', 'java.net.http', 'java.prefs', 'java.scripting', 'java.sql',
        'java.xml', 'java.xml.crypto', 'java.security.jgss',
        // Audit 4 B9: JFreeChart-FX uses java.awt.datatransfer for chart
        // copy; must include java.datatransfer or the runtime image
        // throws ClassNotFoundException on first chart-context-menu open.
        'java.datatransfer',
        // Web addon (Javalin 6 / Jetty 11) also wants:
        //   - java.security.sasl: Jetty's auth subsystem opportunistically
        //     loads SASL even though we never use it; absent module ->
        //     ClassNotFoundException at first https connect.
        //   - jdk.httpserver: Javalin's static-file utility shells out to
        //     com.sun.net.httpserver in some failure paths.
        'java.security.sasl', 'jdk.httpserver',
        'jdk.unsupported', 'jdk.crypto.ec', 'jdk.crypto.cryptoki',
        'jdk.naming.dns', 'jdk.localedata'
].join(',')
def fePanelFxModules = 'javafx.base,javafx.graphics,javafx.controls,javafx.fxml,javafx.swing'

// JVM options baked into the .app bundle. Every string here goes through
// jpackage's `--java-options`; jpackage adds them to the launcher Info.plist
// so the user can't accidentally launch the .app without them.
def fePanelJavaOptions = [
        '-Dprism.order=es2,sw',
        '-Dprism.lcdtext=false',
        '-Dprism.allowhidpi=false',
        '-Dprism.verbose=true',
        // High Sierra's TLS stack inside Java is fine, but log the chosen
        // protocol so reconnect issues are diagnosable.
        '-Djdk.tls.client.protocols=TLSv1.2,TLSv1.3'
]

// macOS bundle metadata. CFBundleIdentifier must be a reverse-DNS string
// unique to this app; LSMinimumSystemVersion gates which macOS versions
// Finder will let launch the .app.
def fePanelMacBundleId = 'com.fathereye.panel.mac'
def fePanelMacMinOS = '10.13.0'

tasks.register('jpackageMacApp') {
    group = 'distribution'
    description = 'Build a macOS .app via jpackage (run on macOS only). Targets High Sierra 10.13.6+.'
    dependsOn 'installDist'
    doLast {
        def os = System.getProperty('os.name', '').toLowerCase()
        if (!os.contains('mac')) {
            throw new GradleException(
                    "jpackageMacApp must run on macOS (current host: ${os}). " +
                    "jpackage cannot cross-compile between OSes.")
        }
        def libDir = layout.buildDirectory.dir('install/panel/lib').get().asFile
        def outDir = rootProject.layout.projectDirectory.dir('dist').asFile
        outDir.mkdirs()
        def appName = 'Father Eye'
        def existing = new File(outDir, "${appName}.app")
        if (existing.exists()) existing.deleteDir()
        def jpkg = "${System.getProperty('java.home')}/bin/jpackage"
        def mainJar = libDir.listFiles().find {
            it.name.startsWith('fathereye-panel-') && it.name.endsWith('.jar')
        }
        if (mainJar == null) throw new GradleException("Main jar not found in ${libDir}")

        // jpackage rejects an app-version starting with 0 ("first number
        // cannot be zero"). 0.3.0-mac.1 -> 1.3.0 for bundle metadata.
        def macAppVersion = projectVersionToMacBundleVersion(project.version.toString())

        def cmd = [
                jpkg,
                '--type', 'app-image',
                '--name', appName,
                '--app-version', macAppVersion,
                '--input', libDir.absolutePath,
                '--main-jar', mainJar.name,
                '--main-class', 'io.fathereye.panel.Launcher',
                '--module-path', libDir.absolutePath,
                '--add-modules', "${fePanelJdkModules},${fePanelFxModules}",
                '--dest', outDir.absolutePath,
                '--mac-package-identifier', fePanelMacBundleId,
                '--mac-package-name', appName,
                '--vendor', 'Father Eye'
        ]
        fePanelJavaOptions.each { cmd << '--java-options' << it }
        exec { commandLine cmd }

        // Audit 4 B6: jpackage 17 omits LSMinimumSystemVersion from the
        // default Info.plist for --type app-image. plutil -replace fails
        // when the key doesn't exist, so try -insert first; if -insert
        // fails (key already there), fall back to -replace.
        def plist = new File(existing, 'Contents/Info.plist')
        if (plist.exists()) {
            def insertResult = exec {
                commandLine 'plutil', '-insert', 'LSMinimumSystemVersion', '-string', fePanelMacMinOS, plist.absolutePath
                ignoreExitValue = true
            }
            if (insertResult.exitValue != 0) {
                exec { commandLine 'plutil', '-replace', 'LSMinimumSystemVersion', '-string', fePanelMacMinOS, plist.absolutePath }
            }
            println "Set LSMinimumSystemVersion=${fePanelMacMinOS} in ${plist}"
        } else {
            logger.warn("Info.plist not found at ${plist}; LSMinimumSystemVersion not set. The .app may show 'requires newer macOS' on launch.")
        }
        println "jpackage output -> ${outDir}/${appName}.app"
    }
}

tasks.register('jpackageMacDmg') {
    group = 'distribution'
    description = 'Build a macOS .dmg installer (run on macOS only). Wraps Father Eye.app for drag-to-Applications install.'
    dependsOn 'installDist'
    doLast {
        def os = System.getProperty('os.name', '').toLowerCase()
        if (!os.contains('mac')) {
            throw new GradleException(
                    "jpackageMacDmg must run on macOS (current host: ${os}).")
        }
        def libDir = layout.buildDirectory.dir('install/panel/lib').get().asFile
        def outDir = rootProject.layout.projectDirectory.dir('dist').asFile
        outDir.mkdirs()
        def appName = 'Father Eye'
        def jpkg = "${System.getProperty('java.home')}/bin/jpackage"
        def mainJar = libDir.listFiles().find {
            it.name.startsWith('fathereye-panel-') && it.name.endsWith('.jar')
        }
        if (mainJar == null) throw new GradleException("Main jar not found in ${libDir}")
        def macAppVersion = projectVersionToMacBundleVersion(project.version.toString())

        def cmd = [
                jpkg,
                '--type', 'dmg',
                '--name', appName,
                '--app-version', macAppVersion,
                '--input', libDir.absolutePath,
                '--main-jar', mainJar.name,
                '--main-class', 'io.fathereye.panel.Launcher',
                '--module-path', libDir.absolutePath,
                '--add-modules', "${fePanelJdkModules},${fePanelFxModules}",
                '--dest', outDir.absolutePath,
                '--mac-package-identifier', fePanelMacBundleId,
                '--mac-package-name', appName,
                '--vendor', 'Father Eye'
        ]
        fePanelJavaOptions.each { cmd << '--java-options' << it }
        exec { commandLine cmd }
        println "macOS dmg -> ${outDir}/${appName}-${macAppVersion}.dmg"
    }
}

// jpackage's --app-version validator rejects '0.x.y' bundle versions on
// macOS. Map our 0.3.0-mac.N to 1.3.0 so the bundle's CFBundleShortVersion
// is plausible. This affects ONLY the bundle metadata Finder reads; the
// in-app VERSION constant in App.java remains the canonical project
// version (0.3.0-mac.N), which is what gets logged + handshaken with the
// bridge.
String projectVersionToMacBundleVersion(String v) {
    if (v.startsWith('0.')) {
        // 0.3.0-mac.1 -> '0.3.0-mac.1'.substring(2) = '3.0-mac.1'
        // strip the trailing -mac.N suffix for plain numeric semver.
        String tail = v.substring(2)
        int dash = tail.indexOf('-')
        if (dash > 0) tail = tail.substring(0, dash)
        return '1.' + tail
    }
    int dash = v.indexOf('-')
    return dash > 0 ? v.substring(0, dash) : v
}
