        exec { commandLine cmd }
        println "macOS dmg -> ${outDir}/${feAgentAppName}-${macAppVersion}.dmg"
    }
}

// Same 0.x -> 1.x bundle-version remap as panel/. jpackage rejects an
// app-version starting with 0; bundle metadata becomes 1.X.Y while the
// in-app project.version stays 0.x-mac.N.
String projectVersionToMacBundleVersion(String v) {
    if (v.startsWith('0.')) {
        String tail = v.substring(2)
        int dash = tail.indexOf('-')
        if (dash > 0) tail = tail.substring(0, dash)
        return '1.' + tail
    }
    int dash = v.indexOf('-')
    return dash > 0 ? v.substring(0, dash) : v
}
