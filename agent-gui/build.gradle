plugins {
    id 'application'
    id 'java'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

version = project.findProperty('agentGuiVersion') ?: '0.1.0-mac.1'
archivesBaseName = 'fathereye-agent-gui'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

application {
    // Same Launcher trick as panel/: a non-Application class calls
    // Application.launch() so JPMS doesn't reject Application.main().
    mainClass = 'io.fathereye.agent.Launcher'
}

javafx {
    version = project.javafxVersion
    // No javafx.swing or javafx.web. The chat is rendered with native
    // JavaFX controls — no embedded WebKit, no Swing interop.
    modules = ['javafx.base', 'javafx.graphics', 'javafx.controls']
}

dependencies {
    // The agent backend is the Claude Code CLI driven as a subprocess
    // (see io.fathereye.agent.agent.AgentService). The Anthropic Java
    // SDK is no longer a dependency — we don't talk to api.anthropic.com
    // ourselves, so we don't ship okhttp, the Anthropic SDK, or its
    // transitive set. Auth is whatever Claude Code is logged in with
    // (typically a Pro/Max subscription via `claude /login`).

    // Markdown parsing. The renderer walks the AST and emits JavaFX
    // TextFlow nodes — we never produce HTML, so no WebView needed.
    implementation 'org.commonmark:commonmark:0.21.0'

    // Used to (a) parse the JSONL events claude emits on stdout and
    // (b) JSON-encode the user messages we write to claude's stdin.
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"

    implementation "org.slf4j:slf4j-api:${slf4jVersion}"
    implementation "ch.qos.logback:logback-classic:${logbackVersion}"

    testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"
}

test {
    useJUnitPlatform()
}

// =========================================================================
// Mac fork build pipeline (mirrors panel/build.gradle).
//
//   :agent-gui:jpackageMacApp -> dist/Claude for High Sierra.app
//   :agent-gui:jpackageMacDmg -> dist/Claude for High Sierra.dmg
//
// Same prism.* tuning as panel/ for the AMD HD 6750M (TeraScale 2,
// non-Metal). 10.13.0 LSMinimumSystemVersion patched into Info.plist
// so Finder accepts the .app on High Sierra.
// =========================================================================

def feAgentJdkModules = [
        'java.base', 'java.desktop', 'java.logging', 'java.management',
        'java.naming', 'java.net.http', 'java.prefs', 'java.scripting',
        'java.sql', 'java.xml', 'java.xml.crypto', 'java.security.jgss',
        'jdk.unsupported', 'jdk.crypto.ec', 'jdk.crypto.cryptoki',
        'jdk.naming.dns', 'jdk.localedata'
].join(',')
def feAgentFxModules = 'javafx.base,javafx.graphics,javafx.controls'

def feAgentJavaOptions = [
        '-Dprism.order=es2,sw',
        '-Dprism.lcdtext=false',
        '-Dprism.allowhidpi=false',
        '-Dprism.maxvram=256m',
        '-Dprism.targetvram=192m',
        '-Dprism.disableRegionCaching=true',
        // High Sierra TLS: explicit 1.2/1.3 so Anthropic API handshake
        // doesn't fall back to TLS 1.0 (which would be rejected anyway,
        // but the failure mode is cleaner with a pin).
        '-Djdk.tls.client.protocols=TLSv1.2,TLSv1.3'
]

def feAgentMacBundleId = 'com.fathereye.agent.mac'
def feAgentMacMinOS = '10.13.0'
def feAgentAppName = 'Claude for High Sierra'

// =========================================================================
// App icon (vintage rainbow Apple). Generated programmatically via
// io.fathereye.agent.icon.IconGenerator at build time -- no binary check
// in. macOS gets a real .icns built via `iconutil -c icns`; Linux gets a
// 512x512 .png. Both wired into the corresponding jpackage --icon flag.
//
// Trademark: the rainbow Apple logo is owned by Apple Inc. The generator
// produces a stylized approximation; if you're shipping this widely,
// replace agent-gui/icons/icon.icns (or icon.png) with your own art.
// =========================================================================

tasks.register('generateAppIcons') {
    group = 'distribution'
    description = 'Generate the iconset / .icns / .png for jpackage --icon (depends on compiled IconGenerator).'
    dependsOn 'compileJava'
    def iconWork = layout.buildDirectory.dir('icons').get().asFile
    def iconsetDir = new File(iconWork, 'icon.iconset')
    def icnsFile = new File(iconWork, 'icon.icns')
    def pngFile = new File(iconWork, 'icon.png')
    inputs.files(sourceSets.main.output)
    outputs.files(icnsFile, pngFile)
    doLast {
        iconWork.mkdirs()
        // Run IconGenerator with the compiled class output on its
        // classpath. We don't need any third-party deps -- pure javax.imageio.
        javaexec {
            classpath = sourceSets.main.runtimeClasspath
            mainClass = 'io.fathereye.agent.icon.IconGenerator'
            args = [iconsetDir.absolutePath, pngFile.absolutePath]
        }
        // .icns conversion needs macOS's iconutil. On Linux we skip --
        // jpackage --icon there takes a .png anyway.
        def os = System.getProperty('os.name', '').toLowerCase()
        if (os.contains('mac')) {
            if (icnsFile.exists()) icnsFile.delete()
            exec {
                commandLine 'iconutil', '-c', 'icns', iconsetDir.absolutePath, '-o', icnsFile.absolutePath
            }
            println "icns -> ${icnsFile}"
        } else {
            // Touch a placeholder file so up-to-date checks behave.
            icnsFile.parentFile.mkdirs()
            if (!icnsFile.exists()) icnsFile.createNewFile()
        }
        println "png  -> ${pngFile}"
    }
}

tasks.register('jpackageMacApp') {
    group = 'distribution'
    description = "Build ${feAgentAppName}.app via jpackage (run on macOS only). Targets High Sierra 10.13.6+."
    dependsOn 'installDist', 'generateAppIcons'
    doLast {
        def os = System.getProperty('os.name', '').toLowerCase()
        if (!os.contains('mac')) {
            throw new GradleException(
                    "jpackageMacApp must run on macOS (current host: ${os}). " +
                    "jpackage cannot cross-compile between OSes.")
        }
        def libDir = layout.buildDirectory.dir('install/agent-gui/lib').get().asFile
        def outDir = rootProject.layout.projectDirectory.dir('dist').asFile
        outDir.mkdirs()
        def existing = new File(outDir, "${feAgentAppName}.app")
        if (existing.exists()) existing.deleteDir()
        def jpkg = "${System.getProperty('java.home')}/bin/jpackage"
        def mainJar = libDir.listFiles().find {
            it.name.startsWith('fathereye-agent-gui-') && it.name.endsWith('.jar')
        }
        if (mainJar == null) throw new GradleException("Main jar not found in ${libDir}")

        def macAppVersion = projectVersionToMacBundleVersion(project.version.toString())
        def icnsFile = layout.buildDirectory.file('icons/icon.icns').get().asFile

        def cmd = [
                jpkg,
                '--type', 'app-image',
                '--name', feAgentAppName,
                '--app-version', macAppVersion,
                '--input', libDir.absolutePath,
                '--main-jar', mainJar.name,
                '--main-class', 'io.fathereye.agent.Launcher',
                '--module-path', libDir.absolutePath,
                '--add-modules', "${feAgentJdkModules},${feAgentFxModules}",
                '--dest', outDir.absolutePath,
                '--mac-package-identifier', feAgentMacBundleId,
                '--mac-package-name', feAgentAppName,
                '--vendor', 'Father Eye'
        ]
        if (icnsFile.exists() && icnsFile.length() > 0) cmd += ['--icon', icnsFile.absolutePath]
        feAgentJavaOptions.each { cmd << '--java-options' << it }
        exec { commandLine cmd }

        // Same LSMinimumSystemVersion patch as panel/. jpackage 17 omits
        // the key by default for --type app-image; insert with -insert,
        // fall back to -replace if it already exists.
        def plist = new File(existing, 'Contents/Info.plist')
        if (plist.exists()) {
            def insertResult = exec {
                commandLine 'plutil', '-insert', 'LSMinimumSystemVersion', '-string', feAgentMacMinOS, plist.absolutePath
                ignoreExitValue = true
            }
            if (insertResult.exitValue != 0) {
                exec { commandLine 'plutil', '-replace', 'LSMinimumSystemVersion', '-string', feAgentMacMinOS, plist.absolutePath }
            }
            println "Set LSMinimumSystemVersion=${feAgentMacMinOS} in ${plist}"
        }
        println "jpackage output -> ${outDir}/${feAgentAppName}.app"
    }
}

// =========================================================================
// Linux jpackage target — for cross-platform smoke tests of the Mac app on
// a Linux dev host. The same JVM properties get baked in via --java-options
// for behavioral parity with the Mac bundle (the AMD-HD-6750M-specific
// prism options are no-ops on Linux but harmless to pass).
//
// Output:
//   :agent-gui:jpackageLinuxApp -> dist/Claude for High Sierra/
// =========================================================================

tasks.register('jpackageLinuxApp') {
    group = 'distribution'
    description = "Build a Linux app-image via jpackage (run on Linux only). Mirrors jpackageMacApp for cross-platform smoke tests."
    dependsOn 'installDist', 'generateAppIcons'
    doLast {
        def os = System.getProperty('os.name', '').toLowerCase()
        if (!os.contains('linux')) {
            throw new GradleException("jpackageLinuxApp must run on Linux (current host: ${os}).")
        }
        def libDir = layout.buildDirectory.dir('install/agent-gui/lib').get().asFile
        def outDir = rootProject.layout.projectDirectory.dir('dist').asFile
        outDir.mkdirs()
        def existing = new File(outDir, feAgentAppName)
        if (existing.exists()) existing.deleteDir()
        def jpkg = "${System.getProperty('java.home')}/bin/jpackage"
        def mainJar = libDir.listFiles().find {
            it.name.startsWith('fathereye-agent-gui-') && it.name.endsWith('.jar')
        }
        if (mainJar == null) throw new GradleException("Main jar not found in ${libDir}")
        def pngFile = layout.buildDirectory.file('icons/icon.png').get().asFile

        def cmd = [
                jpkg,
                '--type', 'app-image',
                '--name', feAgentAppName,
                '--app-version', projectVersionToMacBundleVersion(project.version.toString()),
                '--input', libDir.absolutePath,
                '--main-jar', mainJar.name,
                '--main-class', 'io.fathereye.agent.Launcher',
                '--module-path', libDir.absolutePath,
                '--add-modules', "${feAgentJdkModules},${feAgentFxModules}",
                '--dest', outDir.absolutePath,
                '--vendor', 'Father Eye'
        ]
        if (pngFile.exists() && pngFile.length() > 0) cmd += ['--icon', pngFile.absolutePath]
        feAgentJavaOptions.each { cmd << '--java-options' << it }
        exec { commandLine cmd }
        println "jpackage Linux output -> ${outDir}/${feAgentAppName}/"
    }
}

